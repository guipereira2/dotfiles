"$schema" = 'https://starship.rs/config-schema.json'

format = '$directory$git_branch$python$nodejs$golang$rust$lua$c$character'

[directory]
style = "bold #dddddd"

[git_branch]
format = '[$symbol $branch]($style) '
style = "bold #888888"
symbol = ""

[character]
success_symbol = "[❯](bold #dddddd)"
error_symbol = "[❯](bold #cc6666)"


[bun]
format = "via [$symbol]($style)"

[buf]
format = "with [$symbol]($style)"

[c]
format = '[$symbol ](#888888)'
symbol = ""

[cmake]
format = "via [$symbol]($style)"

[cobol]
format = "via [$symbol]($style)"

[cpp]
format = "via [$symbol($name)]($style)"

[crystal]
format = "via [$symbol]($style)"

[daml]
format = "via [$symbol]($style)"

[dart]
format = "via [$symbol]($style)"

[deno]
