# Shell
command = /usr/bin/zsh -l

# Fonte
font-family = JetBrainsMono Nerd Font
font-size = 12
font-feature = liga
font-feature = calt

# Janela
window-padding-x = 15
window-padding-y = 15,0
background-opacity = 0.9
window-decoration = none

# Notificações
desktop-notifications = false

# Clipboard
copy-on-select = true

# Cursor
cursor-color = #ffffff
cursor-text = #1f1f1f

# Cores
background = #1f1f1f
foreground = #d4d4d4

# Normal (0-7)
palette = 0=#2d2d2d
palette = 1=#cc6666
palette = 2=#99cc99
palette = 3=#f0c674
palette = 4=#81a2be
palette = 5=#b294bb
palette = 6=#8abeb7
palette = 7=#c5c8c6

# Bright (8-15)
palette = 8=#4a4a4a
palette = 9=#d07070
palette = 10=#b5d6b2
palette = 11=#f0d080
palette = 12=#9bbace
palette = 13=#c9a8d4
palette = 14=#a8cac8
palette = 15=#e8e8e8

# Keybindings
keybind = ctrl+shift+c=copy_to_clipboard
keybind = ctrl+shift+v=paste_from_clipboard
keybind = shift+enter=text:\x1b\r
keybind = ctrl+tab=text:\x1b[9;5u
keybind = ctrl+shift+tab=text:\x1b[9;6u
