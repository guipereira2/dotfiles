command = /usr/bin/zsh -l

quit-after-last-window-closed = false

font-family = JetBrainsMono Nerd Font
font-size = 12
font-feature = liga
font-feature = calt

window-padding-x = 15
window-padding-y = 15
window-padding-balance = true
background-opacity = 0.9
window-decoration = auto
gtk-titlebar = false

desktop-notifications = false

copy-on-select = true

cursor-color = #ffffff
cursor-text = #1A1A1A

background = #1A1A1A
foreground = #d4d4d4

palette = 0=#2d2d2d
palette = 1=#cc6666
palette = 2=#99cc99
palette = 3=#f0c674
palette = 4=#81a2be
palette = 5=#b294bb
palette = 6=#8abeb7
palette = 7=#c5c8c6

palette = 8=#4a4a4a
palette = 9=#d07070
palette = 10=#b5d6b2
palette = 11=#f0d080
palette = 12=#9bbace
palette = 13=#c9a8d4
palette = 14=#a8cac8
palette = 15=#e8e8e8

keybind = ctrl+shift+c=copy_to_clipboard
keybind = ctrl+shift+v=paste_from_clipboard
keybind = shift+enter=text:\x1b\r
keybind = ctrl+tab=text:\x1b[9;5u
keybind = ctrl+shift+tab=text:\x1b[9;6u
keybind = ctrl+enter=unbind
